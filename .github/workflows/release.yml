# ──────────────────────────────────────────────────────────────────────────────
# NPM_TOKEN setup (one-time):
#
# 1. Go to https://www.npmjs.com → Avatar → Access Tokens → Generate New Token
#    Select type: "Automation" (bypasses 2FA for CI)
# 2. Go to https://github.com/drnachio/postext/settings/secrets/actions
#    Click "New repository secret"
#    Name:  NPM_TOKEN
#    Value: the token from step 1
# ──────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    # Skip release commits to avoid infinite loops
    if: "!contains(github.event.head_commit.message, 'chore: release')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Determine bump type from merged PR labels
      - name: Get version bump type
        id: bump
        uses: actions/github-script@v7
        with:
          script: |
            // Find the merged PR for this push
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 5,
            });

            const mergedPr = prs.find(pr =>
              pr.merge_commit_sha === context.sha && pr.merged_at
            );

            let bump = 'patch';
            if (mergedPr) {
              const labels = mergedPr.labels.map(l => l.name.toLowerCase());
              if (labels.includes('major')) bump = 'major';
              else if (labels.includes('minor')) bump = 'minor';
              core.info(`PR #${mergedPr.number}: labels=[${labels}] → ${bump}`);
            } else {
              core.info('No merged PR found, defaulting to patch');
            }

            core.setOutput('type', bump);

      # Bump version in package.json (no git tag yet)
      - name: Bump version
        id: version
        working-directory: packages/postext
        run: |
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to v$VERSION (${{ steps.bump.outputs.type }})"

      # Build & test the package
      - run: pnpm turbo run build --filter=postext
      - run: pnpm turbo run test --filter=postext

      # Publish to npm
      - name: Publish to npm
        working-directory: packages/postext
        run: pnpm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Commit version bump, tag, and push
      - name: Commit & tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/postext/package.json
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --follow-tags

      # Keep develop in sync with the version bump
      - name: Sync version to develop
        run: |
          git fetch origin develop
          git checkout develop
          git merge main --no-edit
          git push origin develop
